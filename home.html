        <span class="auth-header-title sidebar-logo-text">Choice<span class="text-secondary">Draft</span></span>

        <a id="adminNavLink" href="admin.html" class="nav-item hidden">
          <div class="nav-icon"><i class="fa-solid fa-user-shield"></i></div>
          <span class="nav-label">Admin Portal</span>

        <a href="profile.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-user"></i></div>

          <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div>

    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="topbar-logo-text"><span class="white font-black">Choice</span><span
              class="text-secondary font-black">Draft</span></div>
        </div>
        <div class="flex items-center gap-2">
          <input type="text" id="searchInput" class="topbar-search hidden" placeholder="Search tests...">
          <button id="searchBtn" class="topbar-icon-btn" title="Search"><i
              class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area fade-in">
        <div class="home-content">
          <div class="flex items-center justify-between mb-6 pt-2">
            <h2 id="homeTitle" class="section-title">Dashboard</h2>
          </div>

          <!-- Tabs -->
          <div id="dashboardTabs" class="flex border-b border-light hidden" style="margin-bottom: 0;">
            <button id="myTestsTab" class="tab-btn">My Projects</button>
            <button id="classesTab" class="tab-btn">Classes</button>
            <button id="takeTestTab" class="tab-btn">Public Tests</button>
          </div>

          <!-- Grid Container -->

          </div>

    <!-- Modal for Quick Actions -->
    <div id="actionModal" class="modal-overlay hidden">
      <div class="modal-content">

        <p id="actionModalText" class="modal-text">You are performing an action on this test.</p>
        <div id="actionModalInputs" class="hidden flex-col gap-3 mt-4"></div>
        <div class="flex gap-3 mt-6">
          <button id="closeActionModalBtn" class="btn-outline flex-1">Close</button>
          <button id="actionModalConfirmBtn" class="btn-primary flex-1">Confirm</button>
        </div>
      </div>

  <!-- Floating Action Button -->

    <span>Create New</span>

<script src="./cordova.js"></script>
  <script src="./js/config.js"></script>
<script src="./js/app.js"></script>

  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    const myTestsTab = document.getElementById('myTestsTab');
    const takeTestTab = document.getElementById('takeTestTab');
    const classesTab = document.getElementById('classesTab');
    const createNewBtn = document.getElementById('createNewBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const testsGridContainer = document.getElementById('testsGrid');
    const homeTitle = document.getElementById('homeTitle');

    const sidebarUserBlock = document.getElementById('sidebarUserBlock');
    const userNameEl = document.getElementById('userName');
    const userEmailEl = document.getElementById('userEmail');
    const userAvatarEl = document.getElementById('userAvatar');

    let allTests = [];
    let allSubjects = [];
    let currentTab = 'my';
    let currentUserId = null;
    let currentUserRole = null;
    let currentSubjectView = null;

    function toggleSidebar(open) {
      if (open) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }
    }

    menuToggleBtn.addEventListener('click', () => toggleSidebar(true));
    closeMenuBtn.addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

    searchBtn.addEventListener('click', () => {
      const topbar = document.querySelector('.topbar');
      searchInput.classList.toggle('hidden');
      topbar.classList.toggle('search-active', !searchInput.classList.contains('hidden'));
      if (!searchInput.classList.contains('hidden')) {
        searchInput.focus();
      }
    });

    searchInput.addEventListener('input', () => filterAndRender());
    myTestsTab.addEventListener('click', () => switchTab('my'));
    takeTestTab.addEventListener('click', () => switchTab('take'));
    classesTab.addEventListener('click', () => switchTab('classes'));

    // Modal Input Handlers
    window.openJoinClassModal = () => {
      pendingAction = 'JoinClass';
      actionModalTitle.textContent = 'Join Class';
      actionModalText.textContent = 'Enter the join code provided by your teacher.';
      const inputs = document.getElementById('actionModalInputs');
      if (inputs) {
        inputs.innerHTML = `<input type="text" id="modalJoinCode" class="input-field" placeholder="Enter Join Code">`;
        inputs.classList.remove('hidden');
        inputs.classList.add('flex');
        setTimeout(() => document.getElementById('modalJoinCode')?.focus(), 100);
      }
      actionModal.classList.remove('hidden');
      actionModal.style.display = 'flex';
    };

    window.openCreateClassModal = () => {
      pendingAction = 'CreateClass';
      actionModalTitle.textContent = 'Create Class';
      actionModalText.textContent = 'Enter a name and an optional join code for your class.';
      const inputs = document.getElementById('actionModalInputs');
      if (inputs) {
        inputs.innerHTML = `
          <input type="text" id="modalClassName" class="input-field" placeholder="Class Name">
          <input type="text" id="modalClassCode" class="input-field" placeholder="Join Code (Optional)">
        `;
        inputs.classList.remove('hidden');
        inputs.classList.add('flex');
        setTimeout(() => document.getElementById('modalClassName')?.focus(), 100);
      }
      actionModal.classList.remove('hidden');
      actionModal.style.display = 'flex';
    };

    function switchTab(tab) {
      currentTab = tab;
      currentSubjectView = null; // Reset subject view
      createNewBtn.onclick = () => window.ChoiceDraftApp.navigateTo('create-test.html'); // Reset create button

      myTestsTab.classList.toggle('active', tab === 'my');
      classesTab.classList.toggle('active', tab === 'classes');
      takeTestTab.classList.toggle('active', tab === 'take');

      // Reset Modal Inputs when switching tabs
      const inputs = document.getElementById('actionModalInputs');
      if (inputs) {
        inputs.innerHTML = '';
        inputs.classList.add('hidden');
        inputs.classList.remove('flex');
      }

      if (tab === 'classes') {
        homeTitle.textContent = 'My Classes';
        createNewBtn.classList.remove('hidden');
        if (currentUserRole !== 'Student') {
          createNewBtn.innerHTML = '<i class="fa-solid fa-plus"></i><span>Create Class</span>';
          createNewBtn.onclick = window.openCreateClassModal;
        } else {
          createNewBtn.innerHTML = '<i class="fa-solid fa-link"></i><span>Join Class</span>';
          createNewBtn.onclick = window.openJoinClassModal;
        }
      } else if (tab === 'my') {
        homeTitle.textContent = 'My Projects';
        createNewBtn.classList.remove('hidden');
        createNewBtn.innerHTML = '<i class="fa-solid fa-plus"></i><span>Create New</span>';
        createNewBtn.onclick = () => window.ChoiceDraftApp.navigateTo('create-test.html');
      } else {
        homeTitle.textContent = 'Available Tests';
        createNewBtn.classList.add('hidden');
      }

      filterAndRender();
    }

    window.viewSubject = (subjectId) => {
      window.location.href = `subject/index.html?id=${subjectId}`;
    };


    logoutBtn.addEventListener('click', async () => {
      await window.ChoiceDraftApp.dataService.logout();
      window.ChoiceDraftApp.navigateTo('signin.html');
    });

    // Modal logic
    const actionModal = document.getElementById('actionModal');
    const closeActionModalBtn = document.getElementById('closeActionModalBtn');
    const actionModalConfirmBtn = document.getElementById('actionModalConfirmBtn');
    const actionModalTitle = document.getElementById('actionModalTitle');
    const actionModalText = document.getElementById('actionModalText');

    let pendingAction = null;
    let pendingTestId = null;

    window.openTestModal = (action, testName, id) => {
      pendingAction = action;
      pendingTestId = id;
      actionModalTitle.textContent = `${action} Test`;
      if (action === 'Edit') {
        actionModalText.textContent = `You are opening the editor for "${testName}".`;
      } else if (action === 'Collaborators') {
        actionModalText.textContent = `Manage users with access to "${testName}".`;
      } else if (action === 'Stats') {
        actionModalText.textContent = `Viewing performance analytics for "${testName}".`;
      }
      actionModal.classList.remove('hidden');
      actionModal.style.display = 'flex';
    };

    const closeModal = () => {
      actionModal.style.display = 'none';
      actionModal.classList.add('hidden');
      const inputs = document.getElementById('actionModalInputs');
      if (inputs) {
        inputs.innerHTML = '';
        inputs.classList.add('hidden');
        inputs.classList.remove('flex');
      }
    };
    closeActionModalBtn.addEventListener('click', closeModal);

    actionModalConfirmBtn.addEventListener('click', async () => {
      if (pendingAction === 'Edit' && pendingTestId) {
        window.ChoiceDraftApp.navigateTo(`test/index.html?id=${pendingTestId}`);
      } else if (pendingAction === 'JoinClass') {
        const code = document.getElementById('modalJoinCode')?.value.trim();
        if (!code) return alert("Please enter a join code");
        const res = await window.ChoiceDraftApp.dataService.joinSubject(code);
        if (res.success) {
          allSubjects = await window.ChoiceDraftApp.dataService.getSubjects();
          filterAndRender();
          alert(`Successfully joined ${res.subject.name}!`);
        } else {
          return alert(res.error);
        }
      } else if (pendingAction === 'CreateClass') {
        const name = document.getElementById('modalClassName')?.value.trim();
        if (!name) return alert("Class Name is required");
        const code = document.getElementById('modalClassCode')?.value.trim();
        await window.ChoiceDraftApp.dataService.createSubject(name, code);
        allSubjects = await window.ChoiceDraftApp.dataService.getSubjects();
        filterAndRender();
      }
      closeModal();
    });

    async function loadDashboard() {
      testsGridContainer.innerHTML = `
        <div class="skeleton-card">
          <div class="skeleton skeleton-badge"></div>
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-meta"></div>
          <div class="skeleton-actions">
            <div class="skeleton skeleton-btn"></div>
            <div class="skeleton skeleton-btn"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-badge"></div>
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-meta"></div>
          <div class="skeleton-actions">
            <div class="skeleton skeleton-btn"></div>
            <div class="skeleton skeleton-btn"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-badge"></div>
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-meta"></div>
          <div class="skeleton-actions">
            <div class="skeleton skeleton-btn"></div>
            <div class="skeleton skeleton-btn"></div>
          </div>
        </div>
      `;

      // Fire all three in parallel — no need to wait sequentially
      const [user, testsResult, subjectsResult] = await Promise.all([
        window.ChoiceDraftApp.dataService.getCurrentUser(),
        window.ChoiceDraftApp.dataService.getTests(),
        window.ChoiceDraftApp.dataService.getSubjects()
      ]);
      allTests = testsResult;
      allSubjects = subjectsResult;
      currentUserId = user ? user.id : null;
      currentUserRole = user ? user.role : null;

      await window.ChoiceDraftApp.dataService.setupSidebar();

      if (currentUserRole === 'Admin') {
        window.ChoiceDraftApp.navigateTo('admin.html');
        return;
      }
      
      document.getElementById('dashboardTabs').classList.remove('hidden');

      if (currentUserRole === 'Student') {
        myTestsTab.classList.add('hidden');
        switchTab('classes'); // Default to classes for students
      } else {
        myTestsTab.classList.remove('hidden');
        takeTestTab.classList.add('hidden'); // Teachers don't need the Public Tests tab
        switchTab('my'); // Default for Teachers
      }
    }

    function filterAndRender() {
      const query = searchInput.value.toLowerCase();

      if (currentTab === 'classes') {
        let filtered = allSubjects.filter(s => s.name.toLowerCase().includes(query));
        renderClasses(filtered);
      } else {
        let filtered = allTests.filter(t => {
          const matchesQuery = t.title.toLowerCase().includes(query) || (t.description && t.description.toLowerCase().includes(query));
          const isOwner = t.owner_id === currentUserId;
          const isCollaborator = t.collaborators && t.collaborators.some(c => c.user_id === currentUserId);

          if (currentTab === 'my') {
            // Show all tests you own OR collaborate on (class-based or public)
            return matchesQuery && (isOwner || isCollaborator);
          } else {
            // Public Tests tab: tests not owned or collaborated by you, and not class-based
            return matchesQuery && !t.subject_id && !isOwner && !isCollaborator;
          }
        });
        renderTests(filtered);
      }
    }

    function renderClasses(subjects) {
      if (!subjects || subjects.length === 0) {
        testsGridContainer.innerHTML = `
          <div class="tests-empty-state">
            <i class="fa-solid fa-users-rectangle tests-empty-icon"></i>
            <p class="tests-empty-title">No classes yet</p>
            <p class="tests-empty-sub">${currentUserRole === 'Student' ? 'Join a class using a code provided by your teacher.' : 'Create your first class to start organizing tests.'}</p>
          </div>`;
        return;
      }

      testsGridContainer.innerHTML = subjects.map(s => `
        <div class="test-card" onclick="viewSubject('${s.id}')" style="cursor: pointer;">
          <div class="test-card-header">
            <h3 class="test-card-title">${s.name}</h3>
          </div>
          <div class="test-card-chips mt-2">
            ${currentUserRole === 'Student' ?
          `<span class="test-card-chip bg-cyan text-white border-0"><i class="fa-solid fa-check"></i> Enrolled</span>` :
          `<span class="test-card-chip"><i class="fa-solid fa-users"></i> ${s.enrolled_count || 0} Students</span><span class="test-card-chip text-primary"><i class="fa-solid fa-key"></i> Code: ${s.join_code || 'None'}</span>`
        }
          </div>
          ${currentUserRole !== 'Student' ? `
          <div class="test-card-footer" onclick="event.stopPropagation()">
            <div></div>
            <div class="test-card-actions">
              <button class="btn-secondary" title="Manage Class" onclick="window.location.href='subject/index.html?id=${s.id}'"><i class="fa-solid fa-gear"></i></button>
            </div>
          </div>` : ''}
        </div>
      `).join('');
    }

    function renderTests(tests) {
      if (!tests || tests.length === 0) {
        const isMyTab = currentTab === 'my';
        testsGridContainer.innerHTML = `
          <div class="tests-empty-state">
            <i class="fa-solid ${isMyTab ? 'fa-folder-open' : 'fa-magnifying-glass'} tests-empty-icon"></i>
            <p class="tests-empty-title">${isMyTab ? 'No tests yet' : 'No tests available'}</p>
            <p class="tests-empty-sub">${isMyTab
            ? 'Create your first test to get started.'
            : 'There are no tests from other users to take right now.'}</p>
            ${isMyTab ? `<button class="btn-primary" style="width:auto;padding:10px 28px;font-size:16px;border-radius:50px;margin-top:4px;" onclick="window.location.href='create-test.html'"><i class="fa-solid fa-plus" style="margin-right:8px;"></i>Create New Test</button>` : ''}
          </div>`;
        return;
      }
      testsGridContainer.innerHTML = tests.map(test => {
        const isOwner = test.owner_id === currentUserId;
        const isCollaborator = test.collaborators && test.collaborators.some(c => c.user_id === currentUserId);
        const qCount = test.question_count || 0;
        const statusClass = test.status === 'Published' ? 'badge-published' : test.status === 'Finished' ? 'badge-finished' : 'badge-draft';
        const isDeletable = isOwner && (test.status === 'Draft' || test.status === 'Finished');
        const isEditable = isOwner && test.status !== 'Published';
        // Find class name if this test belongs to a subject
        const subjectName = test.subject_id ? (allSubjects.find(s => s.id === test.subject_id)?.name || null) : null;

        return `
          <div class="test-card" onclick="window.location.href='test/index.html?id=${test.id}'" style="cursor: pointer;">
            <div class="test-card-header">
              <h3 class="test-card-title">${test.title}</h3>
              <span class="test-status-badge ${statusClass}">${test.status || 'Draft'}</span>
            </div>
            ${test.description ? `<p class="test-card-desc">${test.description.length > 80 ? test.description.slice(0, 80) + '...' : test.description}</p>` : ''}
            <div class="test-card-chips">
              <span class="test-card-chip"><i class="fa-solid fa-list-ol"></i> ${qCount} questions</span>
              ${subjectName ? `<span class="test-card-chip" style="color:#00c2cb;"><i class="fa-solid fa-users-rectangle"></i> ${subjectName}</span>` : ''}
              ${isCollaborator && !isOwner ? `<span class="test-card-chip" style="color:#f59e0b;"><i class="fa-solid fa-handshake"></i> Collaborator</span>` : ''}
            </div>
            <div class="test-card-footer">
              <div class="test-card-badges">
                ${isOwner ? '<span class="test-card-badge-owner">Owner</span>' : ''}
              </div>
              <div class="test-card-actions" onclick="event.stopPropagation()">
                ${isOwner ? `
                  ${isEditable ? `<button class="btn-secondary" title="Edit" onclick="window.location.href='test/builder/index.html?id=${test.id}'"><i class="fa-solid fa-pencil"></i></button>` : ''}
                  <button class="btn-secondary" title="Questions" onclick="window.location.href='test/questions/index.html?id=${test.id}'"><i class="fa-solid fa-list-ol"></i></button>
                  <button class="btn-secondary" title="View" onclick="window.location.href='test/index.html?id=${test.id}'"><i class="fa-solid fa-eye"></i></button>
                  ${isDeletable ? `<button class="btn-secondary" title="Delete Test" style="color:#ef4444;" onclick="deleteTest('${test.id}', '${test.title.replace(/'/g,"\\'")}')" ><i class="fa-solid fa-trash-can"></i></button>` : ''}
                ` : `<button class="btn-secondary" title="View" onclick="window.location.href='test/index.html?id=${test.id}'"><i class="fa-solid fa-eye"></i></button>`}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }


    window.deleteTest = async function(testId, title) {
      if (!confirm(`Delete "${title}"? This will remove all questions and attempts. This cannot be undone.`)) return;
      const res = await window.ChoiceDraftApp.dataService.deleteTest(testId);
      if (res && res.success) {
        allTests = allTests.filter(t => t.id !== testId);
        filterAndRender();
      } else {
        alert((res && res.error) || 'Failed to delete test.');
      }
    };

    loadDashboard();
  </script>
</body>

</html>
