<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChoiceDraft - Onboarding</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body class="auth-body">

  <div class="onboarding-layout overflow-hidden">
    
    <!-- Skip button -->
    <button id="skipBtn" class="onboarding-skip-btn">
      SKIP
    </button>

    <!-- Content area -->
    <div class="onboarding-content-area">
      
      <!-- Title -->
      <div id="slideTitle" class="onboarding-title">
        Build &amp; Manage<br>Your Pool
      </div>
      
      <!-- Subtitle -->
      <p id="slideSubtitle" class="onboarding-subtitle">
        Organize tests, create a pool of questions, and shuffle them for every student.
      </p>

      <!-- Illustration Area -->
      <div id="illustrationContainer" class="flex items-center justify-center flex-1">
        <div class="onboarding-illustration" id="svgWrapper">
          <!-- Injected by JS -->
        </div>
      </div>

    </div>

    <!-- Bottom controls -->
    <div class="onboarding-controls-area">
      <!-- Dots -->
      <div class="flex gap-2" id="dotsContainer">
        <!-- Rendered via JS -->
      </div>

      <!-- Buttons -->
      <div class="flex w-full onboarding-btn-group" id="btnGroup">
        <button id="prevBtn" class="btn-primary flex-1 rounded-full hidden">
          <i class="fa-solid fa-chevron-left icon-mr"></i> Previous
        </button>
        <button id="nextBtn" class="btn-primary flex-1 rounded-full">
          Next <i class="fa-solid fa-chevron-right icon-ml-8"></i>
        </button>
      </div>

      <!-- Get Started Button (Hidden initially) -->
      <button id="getStartedBtn" class="btn-primary flex-1 rounded-full hidden">
        Get Started
      </button>

    </div>
  </div>

  


<script src="./cordova.js"></script>
  <script src="./js/config.js"></script>
<script src="./js/app.js"></script>

      </svg>`;

    // Last slide: The ChoiceDraft signature concentric circles brand icon
    const svgStart = `
      <div style="position:relative; display:flex; align-items:center; justify-content:center; width:280px; height:280px;">
        <div style="width:180px; height:180px; border-radius:50%; background:#00C2CB; opacity:0.2; position:absolute;"></div>
        <div style="width:120px; height:120px; border-radius:50%; background:#00C2CB; opacity:0.4; position:absolute;"></div>
        <div style="width:60px;  height:60px;  border-radius:50%; background:#00C2CB; position:absolute;"></div>
      </div>`;

    const slides = [
      {
        title: "Build &amp; Manage<br>Your Pool",
        subtitle: "Organize tests, create a pool of questions, and shuffle them for every student.",
        svg: svgPool
      },
      {
        title: "Work Together,<br>Better",
        subtitle: "Invite colleagues to collaborate on tests and manage user accounts with ease.",
        svg: svgCollab
      },
      {
        title: "Smart Scoring &amp;<br>Feedback",
        subtitle: "Automatic grading and detailed performance reports for every test taker.",
        svg: svgScoring
      },
      {
        title: "Ready to Start<br>Drafting?",
        subtitle: "Create, format, and share your first test today.",
        svg: svgStart
      }
    ];

    let current = 0;
    
    const titleEl = document.getElementById('slideTitle');
    const subtitleEl = document.getElementById('slideSubtitle');
    const svgWrapper = document.getElementById('svgWrapper');
    const dotsContainer = document.getElementById('dotsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const skipBtn = document.getElementById('skipBtn');
    const getStartedBtn = document.getElementById('getStartedBtn');
    const btnGroup = document.getElementById('btnGroup');
    const illustrationContainer = document.getElementById('illustrationContainer');

    function renderSlide() {
      const slide = slides[current];
      const isLast = current === slides.length - 1;

      titleEl.innerHTML = slide.title;
      subtitleEl.innerHTML = slide.subtitle;
      svgWrapper.innerHTML = slide.svg;
      illustrationContainer.style.display = 'flex';
      skipBtn.style.display = isLast ? 'none' : 'block';

      dotsContainer.innerHTML = slides.map((_, i) => `
        <div class="onboarding-dot ${i === current ? 'active' : 'inactive'}"></div>
      `).join('');

      if (isLast) {
        btnGroup.classList.add('hidden');
        getStartedBtn.classList.remove('hidden');
      } else {
        btnGroup.classList.remove('hidden');
        getStartedBtn.classList.add('hidden');
        prevBtn.classList.toggle('hidden', current === 0);
      }
    }

    function finishOnboarding() {
      localStorage.setItem('choicedraft_onboarding_seen', 'true');
      window.ChoiceDraftApp.navigateTo('signin.html');
    }

    nextBtn.addEventListener('click', () => {
      if (current < slides.length - 1) { current++; renderSlide(); }
    });

    prevBtn.addEventListener('click', () => {
      if (current > 0) { current--; renderSlide(); }
    });

    skipBtn.addEventListener('click', finishOnboarding);
    getStartedBtn.addEventListener('click', finishOnboarding);

    renderSlide();
  </script>
</body>
</html>
