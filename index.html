<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChoiceDraft - Splash</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://kit.fontawesome.com/ef9baa832e.js" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/ef9baa832e.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="auth-body">

  <div class="screen-container flex items-center justify-center relative">

    <!-- Logo -->
    <div class="relative splash-logo-container">
      <!-- Injected by JS or inline -->
      <div id="splashLogo" class="splash-logo"></div>
    </div>

    <!-- App Name -->
    <p class="text-secondary text-center font-bold splash-title">
      ChoiceDraft
    </p>

    <!-- Tagline -->
    <p class="text-light text-center font-bold splash-tagline">
      A Multiple Choice Maker App
    </p>

    <!-- Loading Dots -->
    <div class="absolute flex gap-2 splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>

  </div>

  


<script src="./cordova.js"></script>
  <script src="./js/config.js"></script>
<script src="./js/app.js"></script>
<script src="./js/ota.js"></script>

  <script>
    // Inject Logo
    document.getElementById('splashLogo').innerHTML = window.ChoiceDraftApp.icons.logo;

    const splashTagline = document.querySelector('.splash-tagline');

    document.addEventListener('deviceready', async () => {
      // 1. Check for OTA Update
      if (splashTagline) splashTagline.textContent = "Checking for updates...";
      
      try {
        const updateApplied = await window.otaService.checkAndApplyUpdate();
        if (updateApplied) {
          if (splashTagline) splashTagline.textContent = "Update installed! Restarting...";
          setTimeout(() => window.location.reload(), 1000);
          return;
        }
      } catch (e) {
        console.error("Update failed", e);
      }

      // 2. Redirect to App
      if (splashTagline) splashTagline.textContent = "Loading ChoiceDraft...";
      setTimeout(() => {
        window.location.href = window.otaService.getBootstrapPath();
      }, 1500);
    }, false);

    // Fallback for browser testing
    if(!window.cordova) {
      setTimeout(() => {
        window.ChoiceDraftApp.splashRedirect();
      }, 2000);
    }
  </script>
</body>

</html>
