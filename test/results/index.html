    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars topbar-menu-icon"></i>
          </button>
          <span class="topbar-title">Test Results</span>
        </div>
        <div class="flex items-center gap-1">
          <a href="../../home.html" class="topbar-icon-btn flex items-center justify-center">
            <i class="fa-solid fa-house topbar-home-icon"></i>
          </a>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area fade-in">
        <div id="resultsContent" class="hidden">
          <!-- Score Card -->
          <div class="result-card-main">
            <h2 id="resultTestTitle" class="font-zain font-800 text-24 mb-6">Test Title</h2>
            <div class="result-score-circle">
              <span id="resultScoreValue" class="result-score-val">0%</span>
              <span class="result-score-label">Final Score</span>
            </div>
            <p id="resultPoints" class="font-zain font-700 text-18 opacity-80 mt-2">0 / 0 Points</p>
            <div id="resultStatusBadge" class="result-status-badge">PASSED</div>
          </div>

          <!-- Actions -->
          <div class="px-6 flex gap-3 mb-8">
            <button id="reTakeBtn" class="btn-outline flex-1 rounded-full py-3">
              <i class="fa-solid fa-rotate-left mr-2"></i> Retake
            </button>
            <button id="goHomeBtn" class="btn-primary flex-1 rounded-full py-3">
              <i class="fa-solid fa-house mr-2"></i> Dashboard
            </button>
          </div>

          <!-- Review Section -->
          <div class="px-6 pb-12">
            <h3 class="action-section-title mb-4">Question Review</h3>
            <div id="reviewList" class="flex flex-col gap-4">
              <!-- Review items rendered by JS -->
            </div>
          </div>
        </div>

        <div id="noResultState" class="p-12 text-center hidden">
          <p class="text-a9a9a9">No results found.</p>
          <a href="../../home.html" class="text-cyan underline mt-4 block">Back to Dashboard</a>
        </div>
      </div>

<script src="../../cordova.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/app.js"></script>

  <script>
    // Sidebar & Navigation
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const sidebarUserBlock = document.getElementById('sidebarUserBlock');

    function toggleSidebar(open) {
      if (open) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }
    }

    menuToggleBtn.addEventListener('click', () => toggleSidebar(true));
    closeMenuBtn.addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
    logoutBtn.addEventListener('click', async () => {
      await window.ChoiceDraftApp.dataService.logout();
      window.ChoiceDraftApp.navigateTo('../../signin.html');
    });

    // Results Display
    const resultsContent = document.getElementById('resultsContent');
    const noResultState = document.getElementById('noResultState');
    const resultTestTitle = document.getElementById('resultTestTitle');
    const resultScoreValue = document.getElementById('resultScoreValue');
    const resultPoints = document.getElementById('resultPoints');
    const resultStatusBadge = document.getElementById('resultStatusBadge');
    const reviewList = document.getElementById('reviewList');
    const reTakeBtn = document.getElementById('reTakeBtn');
    const goHomeBtn = document.getElementById('goHomeBtn');

    async function init() {
      const user = await window.ChoiceDraftApp.dataService.getCurrentUser();
      if (user) {
        sidebarUserBlock.classList.remove('hidden');
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
      }

      const resultData = JSON.parse(sessionStorage.getItem('choicedraft_last_result'));
      if (!resultData) {
        noResultState.classList.remove('hidden');
        return;
      }

      resultsContent.classList.remove('hidden');
      renderResults(resultData);
    }

    async function renderResults(data) {
      const test = await window.ChoiceDraftApp.dataService.getTestById(data.testId);

      resultTestTitle.textContent = data.testTitle;
      resultScoreValue.textContent = `${data.percentage}%`;
      resultPoints.textContent = `${data.score} / ${data.totalPoints} Points`;

      const passingScore = test ? (test.passing_score ?? 70) : 70;
      // Answer key is only revealed if: (1) test is Finished AND (2) show_answer_key is enabled
      const showAnswerKey = test ? (test.status === 'Finished' && !!test.show_answer_key) : false;

      const isPassed = data.percentage >= passingScore;
      resultStatusBadge.textContent = isPassed ? 'PASSED' : 'FAILED';
      resultStatusBadge.className = `result-status-badge ${isPassed ? 'badge-res-passed' : 'badge-res-failed'}`;

      if (test && test.questions && showAnswerKey) {
        reviewList.innerHTML = test.questions.map((q, idx) => {
          const attempt = data.review.find(r => r.questionId === q.id);
          const isCorrect = attempt ? attempt.isCorrect : false;

          return `
            <div class="review-item">
              <div class="flex items-center gap-2 mb-2">
                <span class="pool-q-index">${idx + 1}</span>
                <i class="fa-solid ${isCorrect ? 'fa-check text-primary' : 'fa-xmark text-red-500'}"></i>
                <span class="font-bold font-zain ${isCorrect ? 'text-primary' : 'text-red-500'}">
                  ${isCorrect ? 'Correct' : 'Incorrect'}
                </span>
              </div>
              <p class="review-q-text">${q.text}</p>
              <div class="flex flex-col gap-1">
                ${q.choices.map(c => {
            const isUserSelection = attempt?.userChoiceId === c.id;
            const isCorrectChoice = c.id === q.correct_choice_id;

            let statusClass = '';
            let icon = '';

            if (isCorrectChoice) {
              statusClass = 'correct';
              icon = '<i class="fa-solid fa-circle-check ml-auto"></i>';
            } else if (isUserSelection && !isCorrectChoice) {
              statusClass = 'wrong';
              icon = '<i class="fa-solid fa-circle-xmark ml-auto"></i>';
            }

            return `
                    <div class="review-choice ${isUserSelection ? 'user-selected' : ''} ${statusClass}">
                      <span class="${isUserSelection ? 'border-b-2 border-current' : ''}">${c.text}</span>
                      ${icon}
                    </div>
                  `;
          }).join('')}
              </div>
            </div>
          `;
        }).join('');
      } else if (test && test.questions) {
        // Answer key hidden — show only correct/wrong per question, no correct choice revealed
        reviewList.innerHTML = test.questions.map((q, idx) => {
          const attempt = data.review.find(r => r.questionId === q.id);
          const isCorrect = attempt ? attempt.isCorrect : false;
          return `
            <div class="review-item">
              <div class="flex items-center gap-2 mb-2">
                <span class="pool-q-index">${idx + 1}</span>
                <i class="fa-solid ${isCorrect ? 'fa-check text-primary' : 'fa-xmark text-red-500'}"></i>
                <span class="font-bold font-zain ${isCorrect ? 'text-primary' : 'text-red-500'}">
                  ${isCorrect ? 'Correct' : 'Incorrect'}
                </span>
              </div>
              <p class="review-q-text">${q.text}</p>
              <p class="text-a9a9a9 text-sm mt-1"><i class="fa-solid fa-lock mr-1"></i>Answer key is hidden by the test owner.</p>
            </div>
          `;
        }).join('');
      }

      reTakeBtn.addEventListener('click', () => {
        window.ChoiceDraftApp.navigateTo(`../../test/take/index.html?id=${data.testId}`);
      });

      goHomeBtn.addEventListener('click', () => {
        window.ChoiceDraftApp.navigateTo('../../home.html');
      });
    }

    init();
  </script>
