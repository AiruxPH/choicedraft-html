<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="../../favicon.ico">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taking Test - ChoiceDraft</title>
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zain:wght@200;300;400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://kit.fontawesome.com/ef9baa832e.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="take-test-layout scroll-smooth">

  <!-- Header / Progress Area -->
  <header class="test-progress-container sticky top-0 z-50">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <button id="quitBtn" class="topbar-icon-btn text-a9a9a9" title="Quit Test">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <h1 id="pageTitle" class="topbar-title">Loading...</h1>
      </div>
      <div id="timerDisplay" class="test-timer hidden">
        <i class="fa-solid fa-clock"></i>
        <span id="timerText">00:00</span>
      </div>
    </div>
    <div class="test-progress-bar">
      <div id="progressFill" class="test-progress-fill"></div>
    </div>
  </header>

  <!-- Question Area -->
  <main id="questionArea" class="test-question-area fade-in">
    <!-- State Container -->
    <div id="stateContainer" class="p-8 text-center">
      <p class="text-a9a9a9">Preparing your test...</p>
    </div>

    <!-- Question Content (Rendered by JS) -->
    <div id="questionContent" class="hidden">
      <div class="test-question-header">
        <span id="questionIndex" class="pool-q-index">1</span>
        <span id="questionPoints" class="pool-q-points">10 pts</span>
      </div>
      
      <h2 id="questionText" class="pool-q-text mb-8">
        Question text goes here?
      </h2>

      <div id="choicesContainer" class="flex flex-col gap-3">
        <!-- Choices rendered by JS -->
      </div>
    </div>
  </main>

  <!-- Footer Navigation -->
  <footer class="test-footer sticky bottom-0 z-50">
    <button id="prevBtn" class="btn-secondary flex-1 rounded-full hidden">
      <i class="fa-solid fa-chevron-left mr-2"></i> Previous
    </button>
    <button id="nextBtn" class="btn-primary flex-1 rounded-full">
      Next <i class="fa-solid fa-chevron-right ml-2"></i>
    </button>
  </footer>

  <!-- Quit Confirmation Modal -->
  <div id="quitModal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 class="modal-title">Quit Test?</h2>
      <p class="modal-text">Your progress will not be saved. Are you sure you want to stop now?</p>
      <div class="flex gap-3 mt-8">
        <button id="cancelQuitBtn" class="btn-outline flex-1">Resume</button>
        <button id="confirmQuitBtn" class="btn-danger flex-1">Quit</button>
      </div>
    </div>
  </div>

  


<script src="../../cordova.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/app.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const testId = params.get('id');

    // DOM Elements
    const pageTitle = document.getElementById('pageTitle');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerText = document.getElementById('timerText');
    const progressFill = document.getElementById('progressFill');
    const stateContainer = document.getElementById('stateContainer');
    const questionContent = document.getElementById('questionContent');
    const questionIndexEl = document.getElementById('questionIndex');
    const questionPointsEl = document.getElementById('questionPoints');
    const questionTextEl = document.getElementById('questionText');
    const choicesContainer = document.getElementById('choicesContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const quitBtn = document.getElementById('quitBtn');
    const quitModal = document.getElementById('quitModal');
    const cancelQuitBtn = document.getElementById('cancelQuitBtn');
    const confirmQuitBtn = document.getElementById('confirmQuitBtn');

    // State
    let test = null;
    let questions = [];
    let currentIdx = 0;
    let answers = {}; // QID -> ChoiceID
    let timeRemaining = 0;
    let timerInterval = null;
    let isAnonymous = false;

    async function init() {
      if (!testId) {
        stateContainer.innerHTML = '<p class="text-a9a9a9">No test selected.</p>';
        return;
      }

      test = await window.ChoiceDraftApp.dataService.getTestById(testId);
      if (!test || !test.questions || test.questions.length === 0) {
        stateContainer.innerHTML = '<p class="text-a9a9a9">This test has no questions.</p>';
        return;
      }

      const user = await window.ChoiceDraftApp.dataService.getCurrentUser();
      const isOwner = user && test.owner_id === user.id;
      const isPublic = !test.subject_id; // Public test = no class assignment

      if (!isOwner) {
        let isBlocked = false;
        let blockedReason = "";
        const now = new Date();

        if (test.status === 'Finished') {
          isBlocked = true;
          blockedReason = "This test is finished.";
        } else if (test.end_date && new Date(test.end_date) < now) {
          isBlocked = true;
          blockedReason = "This test has ended.";
        } else if (test.start_date && new Date(test.start_date) > now) {
          isBlocked = true;
          blockedReason = `This test has not started yet. Starts on ${new Date(test.start_date).toLocaleString()}`;
        }

        if (isBlocked) {
          alert(blockedReason);
          window.ChoiceDraftApp.navigateTo(`../index.html?id=${test.id}`);
          return;
        }
      }

      if (test.password && !isOwner) {
        const pwd = prompt("This test is password protected. Enter password:");
        if (pwd !== test.password) {
          alert("Incorrect password.");
          window.ChoiceDraftApp.navigateTo(`../index.html?id=${test.id}`);
          return;
        }
      }

      // Anonymous pre-screen for public tests (not class tests)
      if (isPublic && user && !isOwner) {
        const choice = await showAnonymousPreScreen(user.name);
        isAnonymous = choice === 'anonymous';
      }

      pageTitle.textContent = test.title;
      questions = [...test.questions];

      // Handle Shuffling if set
      if (test.shuffle_questions) {
        questions.sort(() => Math.random() - 0.5);
      }

      // Handle Shuffling Choices per question
      if (test.shuffle_choices) {
        questions.forEach(q => {
          if (q.choices) q.choices.sort(() => Math.random() - 0.5);
        });
      }

      // Timer Setup
      if (test.time_limit) {
        timeRemaining = test.time_limit * 60;
        timerDisplay.classList.remove('hidden');
        startTimer();
      }

      stateContainer.classList.add('hidden');
      questionContent.classList.remove('hidden');
      renderQuestion();
    }

    function startTimer() {
      updateTimerUI();
      timerInterval = setInterval(() => {
        timeRemaining--;
        updateTimerUI();
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          finishTest();
        }
      }, 1000);
    }

    function updateTimerUI() {
      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;
      timerText.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      if (timeRemaining < 60) {
        timerDisplay.classList.add('urgent');
      }
    }

    function renderQuestion() {
      const q = questions[currentIdx];
      questionIndexEl.textContent = currentIdx + 1;
      questionPointsEl.textContent = `${q.points || 10} pts`;
      questionTextEl.textContent = q.text;
      
      // Formatting
      questionTextEl.className = 'pool-q-text mb-8';
      if (q.is_bold) questionTextEl.classList.add('font-bold');
      if (q.is_italic) questionTextEl.classList.add('italic');
      if (q.is_underline) questionTextEl.classList.add('underline');

      choicesContainer.innerHTML = q.choices.map((c, idx) => {
        const letter = String.fromCharCode(65 + idx);
        const isSelected = answers[q.id] === c.id;
        return `
          <button class="choice-selection-btn ${isSelected ? 'selected' : ''}" data-id="${c.id}">
            <div class="choice-letter">${letter}</div>
            <div class="flex-1">${c.text}</div>
          </button>
        `;
      }).join('');

      // Add click listeners to choices
      document.querySelectorAll('.choice-selection-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const choiceId = btn.dataset.id;
          answers[q.id] = choiceId;
          // UI Update
          document.querySelectorAll('.choice-selection-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });

      // Update Navigation
      prevBtn.classList.toggle('hidden', currentIdx === 0);
      if (currentIdx === questions.length - 1) {
        nextBtn.innerHTML = 'Finish Test <i class="fa-solid fa-flag-checkered ml-2"></i>';
      } else {
        nextBtn.innerHTML = 'Next <i class="fa-solid fa-chevron-right ml-2"></i>';
      }

      // Progress Bar
      const progress = ((currentIdx + 1) / questions.length) * 100;
      progressFill.style.width = `${progress}%`;
    }

    nextBtn.addEventListener('click', () => {
      if (currentIdx < questions.length - 1) {
        currentIdx++;
        renderQuestion();
        window.scrollTo(0, 0);
      } else {
        finishTest();
      }
    });

    prevBtn.addEventListener('click', () => {
      if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
        window.scrollTo(0, 0);
      }
    });

    // Quit Modal
    quitBtn.addEventListener('click', () => {
      quitModal.classList.remove('hidden');
    });
    cancelQuitBtn.addEventListener('click', () => {
      quitModal.classList.add('hidden');
    });
    confirmQuitBtn.addEventListener('click', () => {
      window.ChoiceDraftApp.navigateTo(`../index.html?id=${testId}`);
    });

    function showAnonymousPreScreen(userName) {
      return new Promise(resolve => {
        stateContainer.classList.remove('hidden');
        questionContent.classList.add('hidden');
        stateContainer.innerHTML = `
          <div style="max-width:380px;margin:0 auto;padding:24px 0;">
            <div style="width:64px;height:64px;border-radius:50%;background:rgba(0,194,203,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
              <i class="fa-solid fa-user-shield" style="font-size:28px;color:#00c2cb;"></i>
            </div>
            <h2 style="font-size:20px;font-weight:800;color:#002e31;margin-bottom:8px;">How would you like to appear?</h2>
            <p style="font-size:14px;color:#a9a9a9;margin-bottom:24px;">Your scores will be recorded either way. This only affects how your name appears to the teacher.</p>
            <div style="display:flex;flex-direction:column;gap:10px;">
              <button id="identifiedBtn" style="padding:14px 20px;background:#002e31;color:#fff;border:none;border-radius:14px;font-family:Zain;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;">
                <i class="fa-solid fa-user"></i> Take as <strong>${userName}</strong>
              </button>
              <button id="anonymousBtn" style="padding:14px 20px;background:#f0fdff;color:#002e31;border:2px solid #00c2cb;border-radius:14px;font-family:Zain;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;">
                <i class="fa-solid fa-user-secret" style="color:#00c2cb;"></i> Take Anonymously
              </button>
            </div>
          </div>
        `;
        document.getElementById('identifiedBtn').onclick = () => resolve('identified');
        document.getElementById('anonymousBtn').onclick  = () => resolve('anonymous');
      });
    }

    async function finishTest() {
      if (timerInterval) clearInterval(timerInterval);
      
      const user = await window.ChoiceDraftApp.dataService.getCurrentUser();
      
      // Compute Score
      let score = 0;
      let totalPoints = 0;
      const review = questions.map(q => {
        const isCorrect = answers[q.id] === q.correct_choice_id;
        totalPoints += (q.points || 10);
        if (isCorrect) score += (q.points || 10);
        return {
          questionId: q.id,
          userChoiceId: answers[q.id],
          isCorrect
        };
      });

      const percentage = Math.round((score / totalPoints) * 100);

      // Record in session for Results page
      sessionStorage.setItem('choicedraft_last_result', JSON.stringify({
        testId: test.id,
        testTitle: test.title,
        score,
        totalPoints,
        percentage,
        review,
        isAnonymous,
        timestamp: new Date().toISOString()
      }));

      // Submit attempt to API
      const isPreview = params.get('preview') === 'true';
      if (user && !isPreview) {
        try {
          await apiService.attempts.submit(test.id, user.id, answers, isAnonymous);
        } catch(e) {
          console.warn('Attempt save error:', e);
        }
      }

      window.ChoiceDraftApp.navigateTo('../../test/results/index.html');
    }

    init();
  </script>
</body>
</html>
