</head>

              fill="white" fill-rule="evenodd" />
          </svg>
        </div>
        <span class="auth-header-title sidebar-logo-text">Choice<span class="text-secondary">Draft</span></span>
        <button class="close-menu sidebar-close-btn" id="closeMenuBtn" title="Close Menu" aria-label="Close Menu">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <!-- User Info Block -->
      <div id="sidebarUserBlock" class="sidebar-user-block hidden">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <p class="user-name" id="userName">User Name</p>
          <p class="user-email" id="userEmail">user@example.com</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="../../home.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-chalkboard"></i></div>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="../../profile.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-user"></i></div>
          <span class="nav-label">Profile</span>
        </a>
        <a href="../../settings.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-gear"></i></div>
          <span class="nav-label">Settings</span>
        </a>
        <a href="../../about.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-circle-info"></i></div>
          <span class="nav-label">About Us</span>
        </a>
        <div class="flex-1"></div>
        <button id="logoutBtn" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
          <span class="nav-label">Log Out</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <button id="headerBackBtn" class="topbar-icon-btn" title="Back">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <span id="topbarTitle" class="topbar-logo-text">Question Pool</span>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area">
        <div class="home-content">
          <!-- Back Link -->
          <a href="#" id="contentBackBtn" class="back-link">
            <i class="fa-solid fa-chevron-left back-link-icon"></i>
            <span>Test Builder</span>
          </a>

          <!-- Stats & Actions Row -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
              <div class="flex flex-col">
                <span id="totalQuestions" class="pool-stat-val">0</span>
                <span class="pool-stat-label">Questions</span>
              </div>
              <div class="flex flex-col">
                <span id="totalPoints" class="pool-stat-val">0</span>
                <span class="pool-stat-label">Points</span>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button id="shuffleBtn" class="pool-action-btn bg-white border-e0e0e0 text-a9a9a9">
                <i class="fa-solid fa-shuffle"></i>
                <span>Shuffle</span>
              </button>
              <button id="addQuestionBtn" class="pool-action-btn bg-none border-primary text-primary">
                <i class="fa-solid fa-plus"></i>
                <span>Add Question</span>
              </button>
            </div>
          </div>

          <!-- Filters -->
          <div id="tagFilters" class="q-list flex items-center gap-2 mb-6 overflow-x-auto pb-2 scrollbar-none">
            <button class="tag-filter-btn active" data-tag="all">All Questions</button>
            <!-- Tags populated by JS -->
          </div>

          <!-- Questions List -->
          <div id="questionList" class="q-list flex flex-col gap-4 mb-10">
            <!-- Questions populated by JS -->
          </div>
        </div>
      </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay hidden">
      <div class="modal-content">
        <h3 class="modal-title">Delete Question?</h3>
        <p class="modal-text">This action cannot be undone. Are you sure you want to remove this question from the pool?
        </p>
        <div class="flex gap-3 mt-6">
          <button id="cancelDeleteBtn" class="btn-outline flex-1">Cancel</button>
          <button id="confirmDeleteBtn" class="btn-danger flex-1">Delete</button>
        </div>
      </div>
    </div>
  </div>

  


<script src="../../cordova.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/app.js"></script>

  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const headerBackBtn = document.getElementById('headerBackBtn');
    const contentBackBtn = document.getElementById('contentBackBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const sidebarUserBlock = document.getElementById('sidebarUserBlock');
    const userNameEl = document.getElementById('userName');
    const userEmailEl = document.getElementById('userEmail');
    const userAvatarEl = document.getElementById('userAvatar');

    const totalQuestionsEl = document.getElementById('totalQuestions');
    const totalPointsEl = document.getElementById('totalPoints');
    const tagFiltersEl = document.getElementById('tagFilters');
    const questionListEl = document.getElementById('questionList');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const addQuestionBtn = document.getElementById('addQuestionBtn');
    const topbarTitle = document.getElementById('topbarTitle');

    const deleteModal = document.getElementById('deleteModal');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    // State
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('id');
    let currentTest = null;
    let filterTag = 'all';
    let questionToDelete = null;

    function toggleSidebar(open) {
      if (open) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }
    }

    menuToggleBtn.addEventListener('click', () => toggleSidebar(true));
    closeMenuBtn.addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

    const goBack = () => {
      if (testId) {
        window.ChoiceDraftApp.navigateTo(`../../test/builder/index.html?id=${testId}`);
      } else {
        window.ChoiceDraftApp.navigateTo('../../home.html');
      }
    };

    headerBackBtn.addEventListener('click', goBack);
    contentBackBtn.addEventListener('click', (e) => {
      e.preventDefault();
      goBack();
    });

    logoutBtn.addEventListener('click', async () => {
      await window.ChoiceDraftApp.dataService.logout();
      window.ChoiceDraftApp.navigateTo('../../signin.html');
    });

    addQuestionBtn.addEventListener('click', () => {
      window.ChoiceDraftApp.navigateTo(`../questions/editor/index.html?id=${testId}&qid=new`);
    });

    shuffleBtn.addEventListener('click', () => {
      if (!currentTest) return;
      currentTest.questions.sort(() => Math.random() - 0.5);
      window.ChoiceDraftApp.dataService.updateTest(testId, { questions: currentTest.questions });
      renderPool();
    });

    // Modal logic
    cancelDeleteBtn.addEventListener('click', () => {
      deleteModal.classList.add('hidden');
      questionToDelete = null;
    });

    confirmDeleteBtn.addEventListener('click', async () => {
      if (questionToDelete && testId) {
        await window.ChoiceDraftApp.dataService.deleteQuestion(testId, questionToDelete);
        deleteModal.classList.add('hidden');
        questionToDelete = null;
        loadData();
      }
    });

    async function loadData() {
      if (!testId) {
        window.ChoiceDraftApp.navigateTo('../../home.html');
        return;
      }

      currentTest = await window.ChoiceDraftApp.dataService.getTestById(testId);
      const user = await window.ChoiceDraftApp.dataService.getCurrentUser();

      if (user) {
        sidebarUserBlock.classList.remove('hidden');
        userNameEl.textContent = user.name;
        userEmailEl.textContent = user.email;
        userAvatarEl.textContent = user.name.charAt(0).toUpperCase();
      }

      if (currentTest) {
        topbarTitle.textContent = currentTest.title;
        renderPool();
      } else {
        window.ChoiceDraftApp.navigateTo('../../home.html');
      }
    }

    function renderPool() {
      const qList = currentTest.questions || [];
      const totalPoints = qList.reduce((sum, q) => sum + (q.points || 0), 0);

      totalQuestionsEl.textContent = qList.length;
      totalPointsEl.textContent = totalPoints;

      // Extract Tags
      const tags = ['all', ...new Set(qList.map(q => q.pool_tag).filter(Boolean))];

      tagFiltersEl.innerHTML = tags.map(tag => `
        <button class="tag-filter-btn ${filterTag === tag ? 'active' : ''}" data-tag="${tag}">
          ${tag === 'all' ? 'All Questions' : tag}
        </button>
      `).join('');

      tagFiltersEl.querySelectorAll('.tag-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filterTag = btn.dataset.tag;
          renderPool();
        });
      });

      // Filter
      const filtered = filterTag === 'all' ? qList : qList.filter(q => q.pool_tag === filterTag);

      if (filtered.length === 0) {
        questionListEl.innerHTML = `
          <div class="flex flex-col items-center justify-center py-20 gap-4">
            <p class="text-light text-lg">No questions yet in this category.</p>
            <button class="btn-primary rounded-full px-6" onclick="window.location.href='../questions/editor/index.html?id=${testId}&qid=new'">
              Add first question
            </button>
          </div>
        `;
        return;
      }

      questionListEl.innerHTML = filtered.map((q, idx) => {
        return `
            <div class="pool-question-card">
              <div class="flex items-start justify-between">
                <div class="flex-1 pr-2">
                  <div class="flex items-center gap-2 mb-2">
                    <span class="pool-q-index">${idx + 1}</span>
                    ${q.pool_tag ? `<span class="pool-q-tag">${q.pool_tag}</span>` : ''}
                    <span class="pool-q-points">${q.points || 10} pts</span>
                  </div>
                  <p class="pool-q-text ${q.is_bold ? 'font-bold' : ''} ${q.is_italic ? 'italic' : ''} ${q.is_underline ? 'underline' : ''}">
                    ${q.text}
                  </p>
                  <div class="flex flex-col gap-1 mt-3">
                    ${(q.choices || []).map(c => `
                      <div class="pool-choice-row ${c.id === q.correct_choice_id ? 'correct' : ''}">
                        ${c.id === q.correct_choice_id ? '<i class="fa-solid fa-circle-check"></i>' : ''}
                        <span>${c.text}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
                <div class="flex flex-col gap-2">
                  <button class="pool-edit-circle" onclick="window.location.href='../questions/editor/index.html?id=${testId}&qid=${q.id}'">
                    <i class="fa-solid fa-pen"></i>
                  </button>
                  <button class="pool-delete-circle" data-id="${q.id}">
                    <i class="fa-solid fa-trash-can"></i>
                  </button>
                </div>
              </div>
            </div>
        `;
      }).join('');

      questionListEl.querySelectorAll('.pool-delete-circle').forEach(btn => {
        btn.addEventListener('click', () => {
          questionToDelete = btn.dataset.id;
          deleteModal.classList.remove('hidden');
        });
      });
    }

    loadData();
  </script>
</body>

</html>
