<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="../../../favicon.ico">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChoiceDraft - Question Editor</title>
  <link rel="stylesheet" href="../../../css/styles.css">
  <script src="../../../cordova.js"></script>
  <script src="https://kit.fontawesome.com/ef9baa832e.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-app">
  <div class="home-layout">
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header flex items-center gap-3">
        <div class="sidebar-logo-icon">
          <svg class="w-full h-full" fill="none" viewBox="0 0 150 150">

              fill="white" fill-rule="evenodd" />
          </svg>
        </div>
        <span class="auth-header-title sidebar-logo-text">Choice<span class="text-secondary">Draft</span></span>
        <button class="close-menu sidebar-close-btn" id="closeMenuBtn" title="Close Menu" aria-label="Close Menu">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <!-- User Info Block -->
      <div id="sidebarUserBlock" class="sidebar-user-block hidden">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <p class="user-name" id="userName">User Name</p>
          <p class="user-email" id="userEmail">user@example.com</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="../../../home.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-chalkboard"></i></div>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="../../../profile.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-user"></i></div>
          <span class="nav-label">Profile</span>
        </a>
        <a href="../../../settings.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-gear"></i></div>
          <span class="nav-label">Settings</span>
        </a>
        <a href="../../../about.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-circle-info"></i></div>
          <span class="nav-label">About Us</span>
        </a>
        <div class="flex-1"></div>
        <button id="logoutBtn" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
          <span class="nav-label">Log Out</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <button id="headerBackBtn" class="topbar-icon-btn" title="Back">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <span id="pageTitle" class="topbar-logo-text">Edit Question</span>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area">
        <div class="home-content">
          <!-- Back Link -->
          <a href="#" id="contentBackBtn" class="back-link">
            <i class="fa-solid fa-chevron-left back-link-icon"></i>
            <span>Question Pool</span>
          </a>

          <!-- Error Banner -->
          <div id="errorBanner" class="error-banner hidden">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="errorMessage"></span>
          </div>

          <!-- Question Text Section -->
          <div class="flex flex-col gap-2 mb-5">
            <label class="input-label-bold">Question Text *</label>

            <!-- Format Toolbar -->
            <div class="editor-toolbar">
              <button id="boldBtn" class="toolbar-btn" title="Bold"><i class="fa-solid fa-bold"></i></button>
              <button id="italicBtn" class="toolbar-btn" title="Italic"><i class="fa-solid fa-italic"></i></button>
              <button id="underlineBtn" class="toolbar-btn" title="Underline"><i
                  class="fa-solid fa-underline"></i></button>
              <span class="toolbar-hint">Text formatting</span>
            </div>

            <textarea id="questionText" class="editor-textarea" rows="3"
              placeholder="Enter your question here..."></textarea>

            <!-- Preview -->
            <div id="textPreview" class="editor-preview hidden">
              <p class="preview-label">Preview:</p>
              <p id="previewContent" class="preview-text"></p>
            </div>
          </div>

          <!-- Answer Choices Section -->
          <div class="flex flex-col gap-2 mb-5">
            <div class="q-list flex items-center justify-between">
              <label class="input-label-bold">Answer Choices *</label>
              <button id="addChoiceBtn" class="link-btn-small">
                <i class="fa-solid fa-plus"></i>
                <span>Add choice</span>
              </button>
            </div>
            <p class="text-xs text-light mb-1">Tap a choice to mark it as the correct answer.</p>

            <div id="choicesList" class="flex flex-col gap-3">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- Points + Tag -->
          <div class="q-list flex gap-3 mb-5">
            <div class="flex flex-col gap-2 w-24">
              <label class="input-label-bold">Points</label>
              <input type="number" id="pointsInput" class="input-field text-center font-bold" value="10" min="1">
            </div>
            <div class="flex flex-col gap-2 flex-1">
              <label class="input-label-bold">Pool Tag (optional)</label>
              <input type="text" id="tagInput" class="input-field" placeholder="e.g. Chapter 1, Genetics...">
            </div>
          </div>

          <!-- Explanation -->
          <div class="flex flex-col gap-2 mb-6">
            <label class="q-list input-label-bold">Explanation (optional)</label>
            <textarea id="explanationInput" class="input-field h-auto" rows="2"
              placeholder="Explain why the correct answer is correct..."></textarea>
          </div>

          <!-- Save Button -->
          <button id="saveQuestionBtn" class="q-list btn-primary w-full h-[54px] rounded-full text-xl font-bold mb-8">
            Save Changes
          </button>
        </div>
      </div>
    </main>
  </div>

  


<script src="../../../js/config.js"></script>
  <script src="../../../js/app.js"></script>

  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const headerBackBtn = document.getElementById('headerBackBtn');
    const contentBackBtn = document.getElementById('contentBackBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    const sidebarUserBlock = document.getElementById('sidebarUserBlock');
    const userNameEl = document.getElementById('userName');
    const userEmailEl = document.getElementById('userEmail');
    const userAvatarEl = document.getElementById('userAvatar');

    const questionTextInput = document.getElementById('questionText');
    const boldBtn = document.getElementById('boldBtn');
    const italicBtn = document.getElementById('italicBtn');
    const underlineBtn = document.getElementById('underlineBtn');
    const textPreview = document.getElementById('textPreview');
    const previewContent = document.getElementById('previewContent');

    const choicesListEl = document.getElementById('choicesList');
    const addChoiceBtn = document.getElementById('addChoiceBtn');
    const pointsInput = document.getElementById('pointsInput');
    const tagInput = document.getElementById('tagInput');
    const explanationInput = document.getElementById('explanationInput');
    const saveQuestionBtn = document.getElementById('saveQuestionBtn');
    const errorBanner = document.getElementById('errorBanner');
    const errorMessage = document.getElementById('errorMessage');
    const pageTitle = document.getElementById('pageTitle');

    // State
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('id');
    const qid = urlParams.get('qid');
    const isNew = qid === 'new';

    let formatting = { bold: false, italic: false, underline: false };
    let choices = [
      { id: Math.random().toString(36).substr(2, 9), text: "" },
      { id: Math.random().toString(36).substr(2, 9), text: "" },
      { id: Math.random().toString(36).substr(2, 9), text: "" },
      { id: Math.random().toString(36).substr(2, 9), text: "" },
    ];
    let correctId = "";

    function toggleSidebar(open) {
      if (open) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }
    }

    menuToggleBtn.addEventListener('click', () => toggleSidebar(true));
    closeMenuBtn.addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

    const goBack = () => {
      if (testId) {
        window.ChoiceDraftApp.navigateTo(`../../index.html?id=${testId}`);
      } else {
        window.ChoiceDraftApp.navigateTo('../../../home.html');
      }
    };

    headerBackBtn.addEventListener('click', goBack);
    contentBackBtn.addEventListener('click', (e) => {
      e.preventDefault();
      goBack();
    });

    logoutBtn.addEventListener('click', async () => {
      await window.ChoiceDraftApp.dataService.logout();
      window.ChoiceDraftApp.navigateTo('../../../signin.html');
    });

    // Formatting
    const updateFormatting = () => {
      questionTextInput.style.fontWeight = formatting.bold ? '700' : '400';
      questionTextInput.style.fontStyle = formatting.italic ? 'italic' : 'normal';
      questionTextInput.style.textDecoration = formatting.underline ? 'underline' : 'none';

      boldBtn.classList.toggle('active', formatting.bold);
      italicBtn.classList.toggle('active', formatting.italic);
      underlineBtn.classList.toggle('active', formatting.underline);

      if (questionTextInput.value.trim() && (formatting.bold || formatting.italic || formatting.underline)) {
        textPreview.classList.remove('hidden');
        previewContent.textContent = questionTextInput.value;
        previewContent.style.fontWeight = formatting.bold ? '700' : '400';
        previewContent.style.fontStyle = formatting.italic ? 'italic' : 'normal';
        previewContent.style.textDecoration = formatting.underline ? 'underline' : 'none';
      } else {
        textPreview.classList.add('hidden');
      }
    };

    boldBtn.addEventListener('click', () => { formatting.bold = !formatting.bold; updateFormatting(); });
    italicBtn.addEventListener('click', () => { formatting.italic = !formatting.italic; updateFormatting(); });
    underlineBtn.addEventListener('click', () => { formatting.underline = !formatting.underline; updateFormatting(); });
    questionTextInput.addEventListener('input', updateFormatting);

    // Choices
    const labelMapping = ['A', 'B', 'C', 'D', 'E', 'F'];

    function renderChoices() {
      choicesListEl.innerHTML = choices.map((c, idx) => `
        <div class="flex items-center gap-3">
          <button class="choice-mark-btn ${correctId === c.id ? 'active' : ''}" data-id="${c.id}">
            ${correctId === c.id ? '<i class="fa-solid fa-check"></i>' : labelMapping[idx]}
          </button>
          <input type="text" class="choice-input flex-1 ${correctId === c.id ? 'active' : ''}" 
                 placeholder="Choice ${labelMapping[idx]}" data-id="${c.id}" value="${c.text}">
          ${choices.length > 2 ? `
            <button class="choice-delete-btn" data-id="${c.id}">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          ` : ''}
        </div>
      `).join('');

      choicesListEl.querySelectorAll('.choice-mark-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          correctId = btn.dataset.id;
          renderChoices();
        });
      });

      choicesListEl.querySelectorAll('.choice-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const choice = choices.find(c => c.id === input.dataset.id);
          if (choice) choice.text = e.target.value;
        });
      });

      choicesListEl.querySelectorAll('.choice-delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (choices.length <= 2) return;
          const cid = btn.dataset.id;
          choices = choices.filter(c => c.id !== cid);
          if (correctId === cid) correctId = "";
          renderChoices();
        });
      });

      addChoiceBtn.style.display = choices.length < 6 ? 'flex' : 'none';
    }

    addChoiceBtn.addEventListener('click', () => {
      if (choices.length >= 6) return;
      choices.push({ id: Math.random().toString(36).substr(2, 9), text: "" });
      renderChoices();
    });

    // Save
    saveQuestionBtn.addEventListener('click', async () => {
      const qText = questionTextInput.value.trim();
      if (!qText) {
        errorBanner.classList.remove('hidden');
        errorMessage.textContent = "Question text is required.";
        return;
      }
      if (choices.some(c => !c.text.trim())) {
        errorBanner.classList.remove('hidden');
        errorMessage.textContent = "All choices must have text.";
        return;
      }
      if (!correctId) {
        errorBanner.classList.remove('hidden');
        errorMessage.textContent = "Please select the correct answer.";
        return;
      }

      errorBanner.classList.add('hidden');

      const questionData = {
        text: qText,
        is_bold: formatting.bold ? 1 : 0,
        is_italic: formatting.italic ? 1 : 0,
        is_underline: formatting.underline ? 1 : 0,
        // Mark is_correct on each choice before sending
        choices: choices.map(c => ({ ...c, is_correct: c.id === correctId ? 1 : 0 })),
        correct_choice_id: correctId,
        points: parseInt(pointsInput.value),
        pool_tag: tagInput.value.trim(),
        explanation: explanationInput.value.trim()
      };

      let success = false;
      if (isNew) {
        success = await window.ChoiceDraftApp.dataService.addQuestion(testId, questionData);
      } else {
        success = await window.ChoiceDraftApp.dataService.updateQuestion(testId, qid, questionData);
      }

      if (success) {
        saveQuestionBtn.textContent = "✓ Saved!";
        saveQuestionBtn.style.background = "#002e31";
        setTimeout(goBack, 800);
      }
    });

    // Init
    async function init() {
      if (!testId) {
        window.ChoiceDraftApp.navigateTo('../../../home.html');
        return;
      }

      pageTitle.textContent = isNew ? "Add Question" : "Edit Question";
      saveQuestionBtn.textContent = isNew ? "Add Question" : "Save Changes";

      const user = await window.ChoiceDraftApp.dataService.getCurrentUser();
      const test = await window.ChoiceDraftApp.dataService.getTestById(testId);

      if (user) {
        sidebarUserBlock.classList.remove('hidden');
        userNameEl.textContent = user.name;
        userEmailEl.textContent = user.email;
        userAvatarEl.textContent = user.name.charAt(0).toUpperCase();
      }

      if (!isNew && test) {
        const q = test.questions.find(q => q.id === qid);
        if (q) {
          questionTextInput.value = q.text;
          formatting = { bold: !!q.is_bold, italic: !!q.is_italic, underline: !!q.is_underline };
          choices = JSON.parse(JSON.stringify(q.choices));
          correctId = q.correct_choice_id || "";
          pointsInput.value = q.points || 10;
          tagInput.value = q.pool_tag || "";
          explanationInput.value = q.explanation || "";
          updateFormatting();
        }
      }
      renderChoices();
    }

    init();
  </script>
</body>

</html>
