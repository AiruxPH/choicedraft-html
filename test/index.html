<body>

              fill="white" fill-rule="evenodd" />
          </svg>
        </div>
        <span class="auth-header-title sidebar-logo-text">Choice<span class="text-secondary">Draft</span></span>
        <button class="close-menu sidebar-close-btn" id="closeMenuBtn" title="Close Menu" aria-label="Close Menu">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <!-- User Info Block -->
      <div id="sidebarUserBlock" class="sidebar-user-block hidden">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <p class="user-name" id="userName">User Name</p>
          <p class="user-email" id="userEmail">user@example.com</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="../home.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-chalkboard"></i></div>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="../profile.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-user"></i></div>
          <span class="nav-label">Profile</span>
        </a>
        <a href="../settings.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-gear"></i></div>
          <span class="nav-label">Settings</span>
        </a>
        <a href="../about.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-circle-info"></i></div>
          <span class="nav-label">About Us</span>
        </a>
        <div class="flex-1"></div>
        <button id="logoutBtn" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
          <span class="nav-label">Log Out</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars topbar-menu-icon"></i>
          </button>
          <span class="topbar-title" id="topbarTitle">Test Details</span>
        </div>
        <div class="flex items-center gap-1">
          <a href="../home.html" class="topbar-icon-btn flex items-center justify-center" title="Go to Dashboard"
            aria-label="Go to Dashboard">
            <i class="fa-solid fa-house topbar-home-icon"></i>
          </a>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area fade-in">
        <!-- Back Link -->
        <a href="../home.html" class="back-link">
          <i class="fa-solid fa-chevron-left back-link-icon"></i>
          <span>All Tests</span>
        </a>

        <div id="stateContainer">
          <!-- Skeleton loader -->
          <div class="skeleton" style="height:130px;border-radius:16px;margin:0 0 14px;"></div>
          <div class="skeleton" style="height:72px;border-radius:14px;margin-bottom:10px;"></div>
          <div class="skeleton" style="height:72px;border-radius:14px;margin-bottom:10px;"></div>
          <div class="skeleton" style="height:72px;border-radius:14px;margin-bottom:10px;"></div>
        </div>

        <!-- Test Info Content (rendered by JS) -->
        <div id="testDetailContent" class="hidden">
          <!-- Hero -->
          <div class="detail-hero">
            <h2 class="detail-title" id="testTitle">Test Title</h2>
            <p class="detail-desc" id="testDesc">Test description goes here...</p>
            <div class="detail-chips" id="testChips">
              <!-- Chips injected by JS -->
            </div>
            <div class="detail-badges" id="testBadges">
              <!-- Badges injected by JS -->
            </div>
          </div>

          <!-- Latest Attempt Summary (if any) -->
          <div id="attemptSummary" class="detail-result-card hidden">
            <p class="text-primary-dark font-700 font-zain">My Latest Score</p>
            <div class="flex items-center gap-3 mt-2">
              <div id="scoreCircle" class="detail-result-score-circle">85%</div>
              <div>
                <p class="text-a9a9a9 font-zain score-points-text" id="scorePoints">17 / 20 points</p>
                <p id="scoreStatus" class="font-700 font-zain score-status-text">PASSED</p>
              </div>
            </div>
          </div>

          <!-- Actions Container -->
          <div class="detail-actions-container">
            <!-- Taker Actions -->
            <div id="takerActionsSection">
              <h4 class="action-section-title">Test Taker</h4>
              <div class="detail-action-group" id="takerActionGroup">
                <!-- Actions injected by JS -->
              </div>
            </div>

            <!-- Maker Actions -->
            <div id="makerActionsSection" class="hidden">
              <h4 class="action-section-title">Test Maker</h4>
              <div class="detail-action-group" id="makerActionGroup">
                <!-- Actions injected by JS -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  


<script src="../cordova.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/app.js"></script>

  <script>
    // Auth Guard
    if (!window.sessionManager.isLoggedIn()) {
      window.location.href = '../signin.html';
    }

    // Navigation & Sidebar
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const sidebarUserBlock = document.getElementById('sidebarUserBlock');

    function toggleSidebar(open) {
      if (open) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }
    }

    menuToggleBtn.addEventListener('click', () => toggleSidebar(true));
    closeMenuBtn.addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
    logoutBtn.addEventListener('click', async () => {
      await window.ChoiceDraftApp.dataService.logout();
      window.ChoiceDraftApp.navigateTo('../signin.html');
    });

    // Data Loading & Rendering
    const params = new URLSearchParams(window.location.search);
    const testId = params.get('id');

    const stateContainer = document.getElementById('stateContainer');
    const testDetailContent = document.getElementById('testDetailContent');
    const topbarTitle = document.getElementById('topbarTitle');
    const testTitle = document.getElementById('testTitle');
    const testDesc = document.getElementById('testDesc');
    const testChips = document.getElementById('testChips');
    const testBadges = document.getElementById('testBadges');
    const attemptSummary = document.getElementById('attemptSummary');
    const makerActionsSection = document.getElementById('makerActionsSection');
    const takerActionGroup = document.getElementById('takerActionGroup');
    const makerActionGroup = document.getElementById('makerActionGroup');

    async function loadTestDetails() {
      if (!testId) {
        stateContainer.innerHTML = '<p class="text-a9a9a9">No test ID specified.</p><a href="../home.html" class="text-cyan underline mt-2 block">Go Home</a>';
        return;
      }

      const test = await window.ChoiceDraftApp.dataService.getTestById(testId);
      const user = await window.ChoiceDraftApp.dataService.getCurrentUser();

      if (!test) {
        stateContainer.innerHTML = '<p class="text-a9a9a9">Test not found.</p><a href="../home.html" class="text-cyan underline mt-2 block">Go Home</a>';
        return;
      }

      // Sidebar User Info
      if (user) {
        sidebarUserBlock.classList.remove('hidden');
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
      }

      renderDetails(test, user);
    }

    function renderDetails(test, currentUser) {

      topbarTitle.textContent = test.title.length > 16 ? test.title.slice(0, 16) + '...' : test.title;
      testTitle.textContent = test.title;
      testDesc.textContent = test.description || '';
      if (!test.description) testDesc.classList.add('hidden');

      // Chips
      const totalPoints = (test.questions || []).reduce((sum, q) => sum + (q.points || 10), 0);
      let chipsHtml = `
        <div class="detail-chip"><i class="fa-solid fa-file-lines"></i> ${test.questions ? test.questions.length : 0} questions</div>
        <div class="detail-chip"><i class="fa-solid fa-check-circle"></i> ${totalPoints} pts</div>
      `;
      if (test.time_limit) {
        chipsHtml += `<div class="detail-chip"><i class="fa-solid fa-clock"></i> ${test.time_limit} min</div>`;
      }
      testChips.innerHTML = chipsHtml;

      // Badges
      const isOwner = test.owner_id === currentUser?.id;
      const collaborators = test.collaborators || [];
      const isCollaborator = collaborators.some(c => c.user_id === currentUser?.id);

      let badgesHtml = '';
      if (isOwner) badgesHtml += `<span class="badge-published" style="background-color: var(--primary); color: white; padding: 2px 10px; border-radius: 50px; font-weight:700; font-size:12px;">Owner</span>`;
      if (isCollaborator) badgesHtml += `<span style="background-color: rgba(0, 194, 203, 0.6); color: white; padding: 2px 10px; border-radius: 50px; font-weight:700; font-size:12px;">Collaborator</span>`;
      testBadges.innerHTML = badgesHtml;

      // Taker Actions
      window.startTest = () => {
        window.location.href = `take/index.html?id=${test.id}${isOwner ? '&preview=true' : ''}`;
      };

      takerActionGroup.innerHTML = `
        <button class="detail-action-btn bg-f2f6f9" onclick="window.startTest()" ${(!test.questions || test.questions.length === 0) ? 'disabled' : ''}>
          <div class="detail-action-icon bg-cyan"><i class="fa-solid ${isOwner ? 'fa-eye' : 'fa-play'} text-white"></i></div>
          <div class="flex-1 text-left">
            <p class="detail-action-label text-primary-dark">${isOwner ? 'Preview Test' : 'Take This Test'}</p>
            <p class="detail-action-sub text-a9a9a9">${test.questions && test.questions.length > 0 ? (isOwner ? 'Test the flow (unrecorded)' : 'Start the test now') : 'No questions yet'}</p>
          </div>
          <i class="fa-solid fa-chevron-left detail-action-arrow text-a9a9a9" style="transform: rotate(180deg)"></i>
        </button>
      `;

      // Maker actions logic...
      const canEdit = isOwner || (isCollaborator && collaborators.find(c => c.user_id === currentUser?.id)?.role === 'editor');
      if (canEdit) {
        makerActionsSection.classList.remove('hidden');
        makerActionGroup.innerHTML = `
          <button class="detail-action-btn bg-f2f6f9" onclick="window.location.href='questions/index.html?id=${test.id}'">
            <div class="detail-action-icon bg-primary-dark"><i class="fa-solid fa-file-lines text-white"></i></div>
            <div class="flex-1 text-left">
              <p class="detail-action-label text-primary-dark">Question Pool</p>
              <p class="detail-action-sub text-a9a9a9">${test.questions ? test.questions.length : 0} questions</p>
            </div>
            <i class="fa-solid fa-chevron-left detail-action-arrow text-a9a9a9" style="transform: rotate(180deg)"></i>
          </button>
          <button class="detail-action-btn bg-f2f6f9" onclick="window.location.href='builder/index.html?id=${test.id}'">
            <div class="detail-action-icon bg-primary-dark"><i class="fa-solid fa-gear text-white"></i></div>
            <div class="flex-1 text-left">
              <p class="detail-action-label text-primary-dark">Test Builder & Settings</p>
              <p class="detail-action-sub text-a9a9a9">Manage structure & settings</p>
            </div>
            <i class="fa-solid fa-chevron-left detail-action-arrow text-a9a9a9" style="transform: rotate(180deg)"></i>
          </button>
          <button class="detail-action-btn bg-f2f6f9" onclick="window.location.href='collaborate/index.html?id=${test.id}'">
            <div class="detail-action-icon bg-primary-dark"><i class="fa-solid fa-users text-white"></i></div>
            <div class="flex-1 text-left">
              <p class="detail-action-label text-primary-dark">Collaboration</p>
              <p class="detail-action-sub text-a9a9a9">Invite & manage co-creators</p>
            </div>
            <i class="fa-solid fa-chevron-left detail-action-arrow text-a9a9a9" style="transform: rotate(180deg)"></i>
          </button>
          <button class="detail-action-btn bg-f2f6f9" onclick="window.location.href='feedback/index.html?id=${test.id}'">
            <div class="detail-action-icon bg-primary-dark"><i class="fa-solid fa-comment-dots text-white"></i></div>
            <div class="flex-1 text-left">
              <p class="detail-action-label text-primary-dark">Give Feedback</p>
              <p class="detail-action-sub text-a9a9a9">Review & respond to submissions</p>
            </div>
            <i class="fa-solid fa-chevron-left detail-action-arrow text-a9a9a9" style="transform: rotate(180deg)"></i>
          </button>
          <button class="detail-action-btn bg-f2f6f9" onclick="window.location.href='report/index.html?id=${test.id}'">
            <div class="detail-action-icon bg-primary-dark"><i class="fa-solid fa-chart-simple text-white"></i></div>
            <div class="flex-1 text-left">
              <p class="detail-action-label text-primary-dark">View Report</p>
              <p class="detail-action-sub text-a9a9a9">Performance averages & stats</p>
            </div>
            <i class="fa-solid fa-chevron-left detail-action-arrow text-a9a9a9" style="transform: rotate(180deg)"></i>
          </button>
        `;
      }



      // Hide skeleton, show content
      stateContainer.classList.add('hidden');
      testDetailContent.classList.remove('hidden');
    }

    loadTestDetails();
  </script>
</body>

</html>
