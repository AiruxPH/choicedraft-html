  <div class="toast" id="toast"
    style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#002e31;color:#fff;border-radius:999px;padding:10px 20px;font-family:Zain;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;">

  <script>
    // Auth Guard
    if (!window.sessionManager.isLoggedIn()) {
      window.location.href = 'signin.html';
    }

    document.getElementById('menuToggleBtn').addEventListener('click', () => toggleSidebar(true));
    document.getElementById('closeMenuBtn').addEventListener('click', () => toggleSidebar(false));
    document.getElementById('sidebarOverlay').addEventListener('click', () => toggleSidebar(false));
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await window.ChoiceDraftApp.dataService.logout();
      window.ChoiceDraftApp.navigateTo('signin.html');
    });

    function toggleSidebar(open) {
      document.getElementById('sidebar').classList.toggle('open', open);
      document.getElementById('sidebarOverlay').classList.toggle('open', open);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 2800);
    }

    let currentUser = null;

    function populateView(user) {
      const initial = user.name.charAt(0).toUpperCase();
      document.getElementById('heroAvatar').textContent = initial;
      document.getElementById('heroName').textContent = user.name;
      document.getElementById('heroEmail').textContent = user.email;
      document.getElementById('heroRoleBadge').textContent = user.role || '—';
      document.getElementById('heroSchoolId').textContent = user.school_id ? `ID: ${user.school_id}` : '';
      document.getElementById('infoName').textContent = user.name;
      document.getElementById('infoEmail').textContent = user.email;
      document.getElementById('infoInstitution').textContent = user.institution || '—';
      document.getElementById('infoSchoolId').textContent = user.school_id || '—';
      document.getElementById('infoSince').textContent = user.created_at
        ? new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : '—';
      // Hide School ID row for non-Students
      document.getElementById('schoolIdRow').style.display = user.role === 'Student' ? 'flex' : 'none';
      document.getElementById('editSchoolIdGroup').style.display = user.role === 'Student' ? 'block' : 'none';

      // Role-specific visibility
      if (user.role === 'Admin') {
        document.getElementById('statsRow').style.display = 'none';
        document.getElementById('institutionRow').style.display = 'none';
      } else if (user.role === 'Student') {
        document.getElementById('statTestsCard').style.display = 'none';
      }
    }

    // Edit Modal
    document.getElementById('editProfileBtn').addEventListener('click', () => {
      document.getElementById('editName').value = currentUser.name;
      document.getElementById('editEmail').value = currentUser.email;
      document.getElementById('editInstitution').value = currentUser.institution || '';
      document.getElementById('editSchoolId').value = currentUser.school_id || '';
      document.getElementById('editErrorBox').style.display = 'none';
      document.getElementById('editOverlay').style.display = 'flex';
    });
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editOverlay').style.display = 'none';
    });

    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const newName = document.getElementById('editName').value.trim();
      const newEmail = document.getElementById('editEmail').value.trim();
      const newInstitution = document.getElementById('editInstitution').value.trim();
      const newSchoolId = document.getElementById('editSchoolId').value.trim();
      const errBox = document.getElementById('editErrorBox');

      if (!newName || !newEmail) {
        errBox.textContent = 'Name and email are required.';
        errBox.style.display = 'block';
        return;
      }

      const updates = { name: newName, email: newEmail, institution: newInstitution };
      if (currentUser.role === 'Student') updates.school_id = newSchoolId;

      const btn = document.getElementById('saveProfileBtn');
      btn.disabled = true; btn.textContent = 'Saving...';

      const res = await window.ChoiceDraftApp.dataService.updateUser(currentUser.id, updates);
      btn.disabled = false; btn.textContent = 'Save Changes';

      if (res && res.success) {
        currentUser = { ...currentUser, ...updates };
        populateView(currentUser);
        // Update sidebar
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userEmail').textContent = currentUser.email;
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
        document.getElementById('editOverlay').style.display = 'none';
        showToast('Profile updated!');
      } else {
        errBox.textContent = (res && res.error) || 'Failed to save changes.';
        errBox.style.display = 'block';
      }
    });

    async function init() {
      currentUser = await window.ChoiceDraftApp.dataService.getCurrentUser();
      if (!currentUser) { window.ChoiceDraftApp.navigateTo('signin.html'); return; }

      // Fetch fresh from API
      const fresh = await apiService.users.getById(currentUser.id);
      if (fresh) { currentUser = { ...currentUser, ...fresh }; sessionManager.setUser(currentUser); }

      await window.ChoiceDraftApp.dataService.setupSidebar();
      populateView(currentUser);

      // Load stats
      const [tests, subjects, userAttempts] = await Promise.all([
        window.ChoiceDraftApp.dataService.getTests(),
        window.ChoiceDraftApp.dataService.getSubjects(),
        window.apiService.attempts.getAllByUser(currentUser.id)
      ]);

      const myTests = tests.filter(t => t.owner_id === currentUser.id);
      document.getElementById('statTests').textContent = myTests.length;
      document.getElementById('statClasses').textContent = subjects.length;

      // Attempts count
      let attemptsCount = 0;
      if (currentUser.role === 'Student') {
        attemptsCount = userAttempts ? userAttempts.length : 0;
      } else {
        // Teachers see the number of tests they've created that are active or finished
        attemptsCount = myTests.filter(t => t.status === 'Published' || t.status === 'Finished').length;
      }
      document.getElementById('statAttempts').textContent = attemptsCount;

      // Hide skeleton and reveal content only after all stats are loaded
      document.getElementById('profileSkeleton').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';
    }

    init();
  </script>
</body>

</html>
